approvedGitRepositories:
  - '**'

compressionLevel: mixed

defaultSemverRangePrefix: ''

enableConstraintsChecks: true

enableMessageNames: true

enableScripts: false

enableTelemetry: false

enableTransparentWorkspaces: false

injectEnvironmentFiles:
  - .env.yarn?

logFilters:
  - code: YN0002
    level: discard
    pattern: "*doesn't provide storybook*@snowball-tech/*"
  - code: YN0060
    level: discard
    pattern: react* is listed by*

nodeLinker: node-modules

npmMinimalAgeGate: 5d

npmPreapprovedPackages:
  - '@snowball-tech/*'

npmPublishRegistry: 'https://registry.npmjs.org'

packageExtensions:
  '@snowball-tech/eslint-snowball-config@*':
    peerDependenciesMeta:
      storybook:
        optional: true

plugins:
  - checksum: 0a2a35fbed2f33f0df1ceb1db51bf72554201f994eaecb86cbc62a295c3d05f7cc44fa8be8e64fc5e1c0bee4f529a17a0cc429ea9e3486ad467443291d5a8e3b
    path: .yarn/plugins/@yarnpkg/plugin-after-install.cjs
    spec: 'https://raw.githubusercontent.com/mhassan1/yarn-plugin-after-install/v0.6.0/bundles/@yarnpkg/plugin-after-install.js'

preferInteractive: true

preferReuse: true

yarnPath: .yarn/releases/yarn-4.14.1.cjs
